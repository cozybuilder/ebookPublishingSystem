name: CI

on:
  push:
  pull_request:

jobs:
  build:
    name: test + release gate
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # 외부 의존성 0 — package-lock 이 없으므로 npm ci 대신 npm install.
      - name: Install
        run: npm install --no-audit --no-fund

      - name: Test (npm test)
        run: npm test

      # build:release = HTML → 캔버스 → PNG → PDF → DOCX → EPUB + 산출물 품질 검증(게이트).
      # 브라우저는 표준 경로(Chrome/Edge)를 자동 탐지한다. windows-latest 러너에는
      # Chrome/Edge 가 기본 설치되어 있어 별도 설정 없이 동작한다.
      # 탐지 실패 시 아래 env 주석을 해제해 CHROME_PATH 를 지정한다.
      - name: Build release (gate)
        run: npm run build:release
        # env:
        #   CHROME_PATH: 'C:\Program Files\Google\Chrome\Application\chrome.exe'
